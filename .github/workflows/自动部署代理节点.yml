name: 自动部署代理到SAP

on:
  workflow_dispatch:
    inputs:
      type:
        description: '选择部署的节点类型'
        required: true
        default: 'Argo隧道CDN'
        type: choice
        options:
          - ws直连
          - xhttp直连
          - Argo隧道CDN

      region:
        description: '选择部署区域'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)

          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-US(Sterling)
          - SAP-US-West(Colorado)
          - SAP-JP(Tokyo)

          - AWS-AU(Sydney)
          - AWS-BR(São Paulo)
          - AWS-KR(Seoul)
          - AWS-CA(Montreal)
          - AWS-US(VA)
          - AWS-US(OR)
          - AWS-EU(Frankfurt)
          - AWS-JP(Tokyo)
          - AWS-SG(Singapore)

          - GCP-AU(Sydney)
          - GCP-BR(São Paulo)
          - GCP-US(IA)
          - GCP-EU(Frankfurt)
          - GCP-JP(Osaka)
          - GCP-JP(Tokyo)
          - GCP-IL(Tel Aviv)
          - GCP-IN(Mumbai)
          - GCP-KSA(Dammam)

          - Azure-AU(Sydney)
          - Azure-BR(São Paulo)
          - Azure-CA(Montreal)
          - Azure-US(VA)
          - Azure-US(WA)
          - Azure-EU(Netherlands)
          - Azure-JP(Tokyo)
          - Azure-SG(Singapore)

          - Neo-UAE(Dubai)
          - Neo-KSA(Riyadh)

      app_name:
        description: '应用名称（可选，留空自动生成）'
        required: false
        default: ''

env:
  MEMORY: 256M
  DISK: 300M

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # 极速安装 CF CLI
      - name: Setup CF CLI
        uses: cloudfoundry/setup-cf-cli@v1

      # 生成部署参数
      - name: Prepare Environment
        shell: bash
        run: |

          RANDOM_STR=$(openssl rand -hex 3)

          declare -A REGION_MAP=(
            ["SG(free)"]="https://api.cf.ap21.hana.ondemand.com free-sg"
            ["US(free)"]="https://api.cf.us10-001.hana.ondemand.com free-us"

            ["SAP-UAE(Dubai)"]="https://api.cf.ae01.hana.ondemand.com sap-ae"
            ["SAP-AU(Sydney)"]="https://api.cf.ap01.hana.ondemand.com sap-au"
            ["SAP-US(Sterling)"]="https://api.cf.us01.hana.ondemand.com sap-us1"
            ["SAP-US-West(Colorado)"]="https://api.cf.us02.hana.ondemand.com sap-us2"
            ["SAP-JP(Tokyo)"]="https://api.cf.jp01.hana.ondemand.com sap-jp"

            ["AWS-AU(Sydney)"]="https://api.cf.ap10.hana.ondemand.com aws-au"
            ["AWS-BR(São Paulo)"]="https://api.cf.br10.hana.ondemand.com aws-br"
            ["AWS-KR(Seoul)"]="https://api.cf.ap12.hana.ondemand.com aws-kr"
            ["AWS-CA(Montreal)"]="https://api.cf.ca10.hana.ondemand.com aws-ca"
            ["AWS-US(VA)"]="https://api.cf.us10-001.hana.ondemand.com aws-usva"
            ["AWS-US(OR)"]="https://api.cf.us11.hana.ondemand.com aws-usor"
            ["AWS-EU(Frankfurt)"]="https://api.cf.eu10-005.hana.ondemand.com aws-eu"
            ["AWS-JP(Tokyo)"]="https://api.cf.jp10.hana.ondemand.com aws-jp"
            ["AWS-SG(Singapore)"]="https://api.cf.ap11.hana.ondemand.com aws-sg"

            ["GCP-AU(Sydney)"]="https://api.cf.ap30.hana.ondemand.com gcp-au"
            ["GCP-BR(São Paulo)"]="https://api.cf.br30.hana.ondemand.com gcp-br"
            ["GCP-US(IA)"]="https://api.cf.us30.hana.ondemand.com gcp-us"
            ["GCP-EU(Frankfurt)"]="https://api.cf.eu30.hana.ondemand.com gcp-eu"
            ["GCP-JP(Osaka)"]="https://api.cf.jp30.hana.ondemand.com gcp-jpo"
            ["GCP-JP(Tokyo)"]="https://api.cf.jp31.hana.ondemand.com gcp-jpt"
            ["GCP-IL(Tel Aviv)"]="https://api.cf.il30.hana.ondemand.com gcp-il"
            ["GCP-IN(Mumbai)"]="https://api.cf.in30.hana.ondemand.com gcp-in"
            ["GCP-KSA(Dammam)"]="https://api.cf.sa31.hana.ondemand.com gcp-sa"

            ["Azure-AU(Sydney)"]="https://api.cf.ap20.hana.ondemand.com az-au"
            ["Azure-BR(São Paulo)"]="https://api.cf.br20.hana.ondemand.com az-br"
            ["Azure-CA(Montreal)"]="https://api.cf.ca20.hana.ondemand.com az-ca"
            ["Azure-US(VA)"]="https://api.cf.us21.hana.ondemand.com az-va"
            ["Azure-US(WA)"]="https://api.cf.us20.hana.ondemand.com az-wa"
            ["Azure-EU(Netherlands)"]="https://api.cf.eu20-001.hana.ondemand.com az-eu"
            ["Azure-JP(Tokyo)"]="https://api.cf.jp20.hana.ondemand.com az-jp"
            ["Azure-SG(Singapore)"]="https://api.cf.ap21.hana.ondemand.com az-sg"

            ["Neo-UAE(Dubai)"]="https://api.cf.neo-ae1.hana.ondemand.com neo-uae"
            ["Neo-KSA(Riyadh)"]="https://api.cf.neo-sa1.hana.ondemand.com neo-ksa"
          )

          IFS=' ' read CF_API PREFIX <<< "${REGION_MAP["${{ github.event.inputs.region }}"]}"

          if [[ -n "${{ github.event.inputs.app_name }}" ]]; then
            APP_NAME="${{ github.event.inputs.app_name }}"
          else
            APP_NAME="${PREFIX}-${RANDOM_STR}"
          fi

          if [[ -n "${{ secrets.DOCKER_IMAGE }}" ]]; then
            DOCKER_IMAGE="${{ secrets.DOCKER_IMAGE }}"
          else
            case "${{ github.event.inputs.type }}" in
              "ws直连")
                DOCKER_IMAGE="ghcr.io/eooce/ws:latest"
                ;;
              "xhttp直连")
                DOCKER_IMAGE="ghcr.io/eooce/goxhttp:latest"
                ;;
              *)
                DOCKER_IMAGE="ghcr.io/eooce/nodejs:main"
                ;;
            esac
          fi

          echo "CF_API=$CF_API" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV

          echo "================================="
          echo "CF_API=$CF_API"
          echo "APP_NAME=$APP_NAME"
          echo "DOCKER_IMAGE=$DOCKER_IMAGE"
          echo "================================="

      # 登录 CF
      - name: Login Cloud Foundry
        run: |
          cf login \
            -a "${{ env.CF_API }}" \
            -u "${{ secrets.EMAIL }}" \
            -p "${{ secrets.PASSWORD }}"

      # 生成 manifest
      - name: Generate Manifest
        run: |

          cat > manifest.yml <<EOF
          applications:
            - name: ${APP_NAME}

              memory: ${MEMORY}
              disk_quota: ${DISK}

              docker:
                image: ${DOCKER_IMAGE}

              env:
                NAME: SAP
                UUID: ${UUID}
                NEZHA_SERVER: ${NEZHA_SERVER}
                NEZHA_PORT: ${NEZHA_PORT}
                NEZHA_KEY: ${NEZHA_KEY}
                ARGO_PORT: ${ARGO_PORT}
                ARGO_DOMAIN: ${ARGO_DOMAIN}
                ARGO_AUTH: ${ARGO_AUTH}
                SUB_PATH: ${SUB_PATH}
                CFIP: ${CFIP}
                CFPORT: ${CFPORT}
                CHAT_ID: ${CHAT_ID}
                BOT_TOKEN: ${BOT_TOKEN}
          EOF

        env:
          APP_NAME: ${{ env.APP_NAME }}
          MEMORY: ${{ env.MEMORY }}
          DISK: ${{ env.DISK }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

          UUID: ${{ secrets.UUID }}
          NEZHA_SERVER: ${{ secrets.NEZHA_SERVER }}
          NEZHA_PORT: ${{ secrets.NEZHA_PORT }}
          NEZHA_KEY: ${{ secrets.NEZHA_KEY }}

          ARGO_PORT: ${{ secrets.ARGO_PORT }}
          ARGO_DOMAIN: ${{ secrets.ARGO_DOMAIN }}
          ARGO_AUTH: ${{ secrets.ARGO_AUTH }}

          SUB_PATH: ${{ secrets.SUB_PATH }}

          CFIP: ${{ secrets.CFIP || 'cf.877774.xyz' }}
          CFPORT: ${{ secrets.CFPORT }}

          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      # 部署
      - name: Deploy Application
        shell: bash
        run: |

          if cf push --strategy rolling; then
            echo "✅ 部署成功"
          else
            echo "❌ 部署失败"

            cf delete "${APP_NAME}" -f -r || true

            echo "SAP 当前资源不足"
            echo "建议北京时间早上 8:20~9:00 部署"

            exit 1
          fi

      # 获取路由
      - name: Get Route
        shell: bash
        run: |

          ROUTE=$(cf app "${APP_NAME}" | awk '/routes:/{print $2}')

          echo "ROUTE=$ROUTE" >> $GITHUB_ENV

          echo "应用路由:"
          echo "$ROUTE"

      # 直连模式自动写入 DOMAIN
      - name: Set DOMAIN
        shell: bash
        run: |

          if [[ "${DOCKER_IMAGE}" =~ (xhttp|goxhttp|ws) ]]; then

            if [[ -n "${ROUTE}" ]]; then

              cf set-env "${APP_NAME}" DOMAIN "${ROUTE}"

              cf restart "${APP_NAME}"

              echo "DOMAIN 已设置为:"
              echo "${ROUTE}"

            fi

          fi

        env:
          ROUTE: ${{ env.ROUTE }}
          APP_NAME: ${{ env.APP_NAME }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

      # 最终信息
      - name: Deployment Info
        run: |

          echo "================================="
          echo "🚀 部署完成"
          echo "================================="

          echo "区域:"
          echo "${{ github.event.inputs.region }}"

          echo ""

          echo "应用名称:"
          echo "${{ env.APP_NAME }}"

          echo ""

          echo "镜像:"
          echo "${{ env.DOCKER_IMAGE }}"

          echo ""

          echo "应用地址:"
          echo "https://${{ env.ROUTE }}"

          echo "================================="
