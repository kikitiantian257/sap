name: 自动部署代理到SAP

on:
  workflow_dispatch:
    inputs:
      type:
        description: '选择部署类型'
        required: true
        default: 'Argo隧道CDN'
        type: choice
        options:
          - ws直连
          - xhttp直连
          - Argo隧道CDN

      region:
        description: '部署区域'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - SAP-JP(Tokyo)
          - AWS-JP(Tokyo)
          - Azure-JP(Tokyo)

      app_name:
        description: '应用名称(可选)'
        required: false
        default: ''

env:
  MEMORY: 256M
  DISK: 300M

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # 安装 CF CLI
      - name: Install CF CLI
        run: |
          wget -q -O cf-cli.tgz \
          "https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github"

          tar -xzf cf-cli.tgz

          sudo mv cf8 /usr/local/bin/cf

          cf version

      # 设置区域
      - name: Prepare Environment
        shell: bash
        run: |

          RANDOM_STR=$(openssl rand -hex 3)

          REGION="${{ github.event.inputs.region }}"

          if [ "$REGION" = "SG(free)" ]; then
            CF_API="https://api.cf.ap21.hana.ondemand.com"
            PREFIX="free-sg"

          elif [ "$REGION" = "US(free)" ]; then
            CF_API="https://api.cf.us10-001.hana.ondemand.com"
            PREFIX="free-us"

          elif [ "$REGION" = "SAP-JP(Tokyo)" ]; then
            CF_API="https://api.cf.jp01.hana.ondemand.com"
            PREFIX="sap-jp"

          elif [ "$REGION" = "AWS-JP(Tokyo)" ]; then
            CF_API="https://api.cf.jp10.hana.ondemand.com"
            PREFIX="aws-jp"

          elif [ "$REGION" = "Azure-JP(Tokyo)" ]; then
            CF_API="https://api.cf.jp20.hana.ondemand.com"
            PREFIX="az-jp"

          fi

          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            APP_NAME="${{ github.event.inputs.app_name }}"
          else
            APP_NAME="${PREFIX}-${RANDOM_STR}"
          fi

          TYPE="${{ github.event.inputs.type }}"

          if [ "$TYPE" = "ws直连" ]; then
            DOCKER_IMAGE="ghcr.io/eooce/ws:latest"

          elif [ "$TYPE" = "xhttp直连" ]; then
            DOCKER_IMAGE="ghcr.io/eooce/goxhttp:latest"

          else
            DOCKER_IMAGE="ghcr.io/eooce/nodejs:main"
          fi

          echo "CF_API=$CF_API" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV

          echo "APP_NAME=$APP_NAME"
          echo "DOCKER_IMAGE=$DOCKER_IMAGE"

      # 登录
      - name: Login CF
        run: |

          cf login \
          -a "${{ env.CF_API }}" \
          -u "${{ secrets.EMAIL }}" \
          -p "${{ secrets.PASSWORD }}"

      # 生成 manifest
      - name: Generate manifest
        shell: bash
        run: |

          cat > manifest.yml << EOF
          applications:
            - name: ${APP_NAME}
              memory: ${MEMORY}
              disk_quota: ${DISK}

              docker:
                image: ${DOCKER_IMAGE}

              env:
                NAME: SAP
                UUID: ${UUID}
                NEZHA_SERVER: ${NEZHA_SERVER}
                NEZHA_PORT: ${NEZHA_PORT}
                NEZHA_KEY: ${NEZHA_KEY}
                ARGO_PORT: ${ARGO_PORT}
                ARGO_DOMAIN: ${ARGO_DOMAIN}
                ARGO_AUTH: ${ARGO_AUTH}
                SUB_PATH: ${SUB_PATH}
                CFPORT: ${CFPORT}
                CHAT_ID: ${CHAT_ID}
                BOT_TOKEN: ${BOT_TOKEN}
          EOF

          cat manifest.yml

        env:
          APP_NAME: ${{ env.APP_NAME }}
          MEMORY: ${{ env.MEMORY }}
          DISK: ${{ env.DISK }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

          UUID: ${{ secrets.UUID }}
          NEZHA_SERVER: ${{ secrets.NEZHA_SERVER }}
          NEZHA_PORT: ${{ secrets.NEZHA_PORT }}
          NEZHA_KEY: ${{ secrets.NEZHA_KEY }}

          ARGO_PORT: ${{ secrets.ARGO_PORT }}
          ARGO_DOMAIN: ${{ secrets.ARGO_DOMAIN }}
          ARGO_AUTH: ${{ secrets.ARGO_AUTH }}

          SUB_PATH: ${{ secrets.SUB_PATH }}

          CFPORT: ${{ secrets.CFPORT }}

          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      # 部署
      - name: Deploy
        shell: bash
        run: |

          if cf push; then

            echo "部署成功"

          else

            echo "部署失败"

            cf delete "${APP_NAME}" -f -r || true

            exit 1
          fi

        env:
          APP_NAME: ${{ env.APP_NAME }}

      # 获取路由
      - name: Get Route
        shell: bash
        run: |

          ROUTE=$(cf app "${APP_NAME}" | awk '/routes:/{print $2}')

          echo "ROUTE=$ROUTE" >> $GITHUB_ENV

          echo "应用地址:"
          echo "https://$ROUTE"

        env:
          APP_NAME: ${{ env.APP_NAME }}

      # 设置 DOMAIN
      - name: Set DOMAIN
        shell: bash
        run: |

          if [[ "${DOCKER_IMAGE}" =~ (xhttp|goxhttp|ws) ]]; then

            cf set-env "${APP_NAME}" DOMAIN "${ROUTE}"

            cf restart "${APP_NAME}"

          fi

        env:
          APP_NAME: ${{ env.APP_NAME }}
          ROUTE: ${{ env.ROUTE }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}

      # 输出信息
      - name: Done
        run: |

          echo "================================="
          echo "部署成功"
          echo "================================="

          echo "应用名称:"
          echo "${{ env.APP_NAME }}"

          echo ""

          echo "应用地址:"
          echo "https://${{ env.ROUTE }}"

          echo "================================="
